name: memscope
version: 2.0.0
description: >
  MemScope — Enterprise Long-term Collaboration Memory System for Hermes Agent.
  Extends memos-local-hermes-plugin with four enterprise memory directions:
  A) CLI command & workflow memory, B) Feishu decision & context memory,
  C) Personal habit & preference memory, D) Team knowledge health & forgetting alerts.
  Features: hybrid search (FTS5+Vector+Pattern), RRF fusion, MMR reranking,
  Ebbinghaus forgetting curves, LLM-assisted preference extraction,
  context-aware command recommendations, and decision card push.
hooks:
  - on_session_start
  - on_session_end
  - pre_llm_call
  - post_llm_call
requires_env:
  - MEMOS_EMBEDDING_MODEL
config:
  db_path:
    type: string
    default: "memos/memscope.db"
    description: "SQLite database path (relative to HERMES_HOME)"
  agent_id:
    type: string
    default: "default"
    description: "Unique agent identifier for memory isolation"
  default_scope:
    type: string
    default: "private"
    choices: ["private", "shared", "all"]
    description: "Default memory search scope"
  enterprise_features:
    type: boolean
    default: true
    description: "Enable enterprise features (all four directions)"
  direction_a_enabled:
    type: boolean
    default: true
    description: "Enable CLI command & workflow memory"
  direction_b_enabled:
    type: boolean
    default: true
    description: "Enable Feishu decision & context memory"
  direction_c_enabled:
    type: boolean
    default: true
    description: "Enable personal habit & preference memory"
  direction_d_enabled:
    type: boolean
    default: true
    description: "Enable team knowledge health & forgetting alerts"
  preference_inference_enabled:
    type: boolean
    default: true
    description: "Enable automatic preference/habit inference from interactions"
  knowledge_health_enabled:
    type: boolean
    default: true
    description: "Enable team knowledge health monitoring and alerts"
  freshness_check_interval_hours:
    type: number
    default: 24
    description: "How often to run freshness checks (hours)"
  stale_threshold_days:
    type: number
    default: 30
    description: "Days before a knowledge entry is considered stale"
  forgotten_threshold_days:
    type: number
    default: 90
    description: "Days before a knowledge entry is considered forgotten"
